name: Deploy to Multiple Servers

on:  
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  deploy:

    strategy:
      matrix:
        target-server: [api1, api2]
        
    runs-on: ${{ matrix.target-server }}

    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image and restart container
        env:
          READ_CONNECTION_STRING: ${{ secrets.READ_CONNECTION_STRING }}
          WRITE_CONNECTION_STRING: ${{ secrets.WRITE_CONNECTION_STRING }}
        run: |
          cd /opt/csharp-api
          docker compose pull
          docker compose up -d
          docker image prune -f
