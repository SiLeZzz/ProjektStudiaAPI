services:
  postgres:
    image: postgres:17
    container_name: projektstudiaapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webapi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-webapi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projektstudiaapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__ReadConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-webapi};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      ConnectionStrings__WriteConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-webapi};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: WebAPI
      Jwt__Audience: WebAPIClients
      Jwt__SecretKey: ${JWT_SECRET_KEY:-local-development-secret-key-change-me-12345}
      Jwt__ExpirationHours: 8
      BootstrapAdmin__Login: ${BOOTSTRAP_ADMIN_LOGIN:-admin}
      BootstrapAdmin__Password: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin123!}
      BootstrapAdmin__Imie: System
      BootstrapAdmin__Nazwisko: Administrator
      BootstrapAdmin__FirmaNazwa: Firma systemowa
      BootstrapAdmin__FirmaNip: 0000000000
      BootstrapAdmin__DzialNazwa: Administracja
      BootstrapAdmin__StanowiskoNazwa: Administrator
    ports:
      - "8080:8080"

volumes:
  postgres_data:
